              pm: "<span class='font-semibold'>13.30-17.00:</span> Individual PostTest at To Be Number One",
              evening: "Individual PostTest at To Be Number One" },
            { date: "7 มิ.ย. (Jun 07)", day: "Sunday", dayTh: "วันอาทิตย์", week: "W6",
              am: "Individual PostTest at To Be Number One<br><span class='text-[11px] text-gray-500'>Hack-10.00</span>",
              pm: "<div class='mb-1.5'><span class='font-semibold'>13.30-16.00:</span> Pitching & Presentation at To Be Number One</div><div><span class='font-semibold'>16.00-17.00:</span> Award at To Be Number One</div>",
              evening: "Party<br><span class='text-[11px] text-gray-500'>TBA</span>" },
            { date: "8 มิ.ย. (Jun 08)", day: "Monday", dayTh: "วันจันทร์", week: "W6",
              am: "Home",
              pm: "-",
              evening: "-" }
        ];

        let currentWeek = 'all';

        function filterWeek(filter) {
            // Update filter button styling
            document.querySelectorAll('#week-filters button').forEach(btn => {
                if (btn.dataset.week === filter) {
                    btn.className = "px-4 py-1 rounded-full bg-blue-600 text-white text-sm font-semibold whitespace-nowrap shadow-sm";
                } else {
                    btn.className = "px-4 py-1 rounded-full bg-gray-200 text-gray-700 text-sm font-semibold whitespace-nowrap hover:bg-gray-300 transition";
                }
            });

            currentWeek = filter;
            applyFilters();
        }

        function applyFilters() {
            const container = document.getElementById('schedule-container');
            container.innerHTML = '';
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            let filteredData = currentWeek === 'all' ? scheduleData : scheduleData.filter(d => d.week === currentWeek);

            if (searchTerm) {
                filteredData = filteredData.filter(item => {
                    const searchableText = `${item.date || ''} ${item.dayTh || ''} ${item.am || ''} ${item.pm || ''} ${item.evening || ''}`.toLowerCase();
                    return searchableText.includes(searchTerm);
                });
            }

            if (filteredData.length === 0) {
                container.innerHTML = `<div class="text-center py-10"><p class="text-gray-500 text-sm">ไม่พบข้อมูลที่ค้นหา</p></div>`;
                return;
            }

            const dayColors = { "Sunday": "border-red-500", "Monday": "border-yellow-400", "Tuesday": "border-pink-500", "Wednesday": "border-green-500", "Thursday": "border-orange-500", "Friday": "border-blue-400", "Saturday": "border-purple-500" };

            filteredData.forEach(item => {
                const card = document.createElement('div');

                if (item.isRefreshment) {
                    card.className = `bg-red-50 rounded-xl shadow-sm border border-red-200 p-4 mb-4 border-l-4 border-red-500`;
                    card.innerHTML = `
                        <div class="flex justify-between items-center">
                            <h2 class="font-bold text-base text-red-800">${item.date}</h2>
                            <span class="text-xs font-semibold px-2 py-1 bg-red-100 rounded text-red-700 shadow-sm">${item.dayTh} (${item.day})</span>
                        </div>
                        <div class="flex items-center justify-center gap-2 mt-4">
                            <span class="text-2xl">☕</span>
                            <p class="font-semibold text-red-700 text-lg">Refreshment Time</p>
                        </div>
                    `;
                    container.appendChild(card);
                    return;
                }

                const borderCol = dayColors[item.day] || "border-gray-400";
                card.className = `bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-4 border-l-4 ${borderCol}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3 border-b border-gray-100 pb-3">
                        <h2 class="font-bold text-base text-gray-800">${item.date}</h2>
                        <span class="text-xs font-semibold px-2 py-1 bg-gray-100 rounded text-gray-600 shadow-sm">${item.dayTh} (${item.day})</span>
                    </div>
                    <div class="space-y-3 text-sm">
                        <!-- Morning -->
                        <div class="p-3 rounded-lg bg-blue-50/50">
                            <div class="flex items-start">
                                <div class="w-[80px] flex-shrink-0 flex flex-col">
                                    <span class="text-blue-800 font-semibold leading-none">ช่วงเช้า</span>
                                    <span class="text-gray-500 text-[11px] mt-1 font-mono tracking-tighter">09:00-12:00</span>
                                </div>
                                <div class="text-gray-800 leading-tight flex-1 pl-2">${item.am}</div>
                            </div>
                        </div>
                        <!-- Afternoon -->
                        <div class="p-3 rounded-lg bg-orange-50/50">
                            <div class="flex items-start">
                                <div class="w-[80px] flex-shrink-0 flex flex-col">
                                    <span class="text-orange-800 font-semibold leading-none">ช่วงบ่าย</span>
                                    <span class="text-gray-500 text-[11px] mt-1 font-mono tracking-tighter">13:30-17:00</span>
                                </div>
                                <div class="text-gray-800 leading-tight flex-1 pl-2">${item.pm}</div>
                            </div>
                        </div>
                        <!-- Evening -->
                        <div class="p-3 rounded-lg bg-indigo-50/50">
                            <div class="flex items-start">
                                <div class="w-[80px] flex-shrink-0 flex flex-col">
                                    <span class="text-indigo-800 font-semibold leading-none">ช่วงค่ำ</span>
                                    <span class="text-gray-500 text-[11px] mt-1 font-mono tracking-tighter">18:30-20:30</span>
                                </div>
                                <div class="text-gray-800 leading-tight flex-1 pl-2">${item.evening}</div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Initialize app with all schedule displayed
        filterWeek('all');

        // Scroll to Top Logic
        window.onscroll = function() {
            const btn = document.getElementById('scrollToTopBtn');
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                btn.classList.remove('hidden');
            } else {
                btn.classList.add('hidden');
            }
        };
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
